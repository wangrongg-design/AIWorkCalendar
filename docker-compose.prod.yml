services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      API_PORT: 3001
    ports:
      - "${API_PORT_BIND:-127.0.0.1:3001}:3001"
    volumes:
      - "${EXPORT_STORAGE_HOST_DIR:-./storage/exports}:${EXPORT_STORAGE_DIR:-/app/storage/exports}"
      - "${WORK_LOG_ATTACHMENT_HOST_DIR:-./storage/work-log-attachments}:${WORK_LOG_ATTACHMENT_DIR:-/app/storage/work-log-attachments}"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "${WEB_PORT_BIND:-127.0.0.1:3000}:3000"
    depends_on:
      - api
    restart: unless-stopped
